<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./pwa-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#151318" />
    <!-- GitHub Pages 无响应头能力，以 meta 形式提供 CSP 降级（与 vercel.json 一致） -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https: data: blob:; media-src 'self' https: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://api.music.abloom.site https://api.github.com; manifest-src 'self'; worker-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meliora" />
    <meta name="description" content="Meliora - 沉浸式单页音乐播放器" />
    <!-- 声明站点为深色主题，提示浏览器使用对应的内置 UI 配色 -->
    <meta name="color-scheme" content="dark" />
    <!-- 同源完整 Referer，跨源仅发送来源（保护隐私同时兼容 CDN/分析） -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- 提前与音乐 API 域建立连接，降低首次请求延迟 -->
    <link rel="preconnect" href="https://api.music.abloom.site" crossorigin />
    <title>Meliora · Music Player</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
